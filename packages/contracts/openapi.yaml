openapi: 3.1.0
info:
  title: ALL-Flow API
  version: 1.0.0
  description: |
    ALL-Flow 사내 협업 시스템 백엔드 API 스펙.
    프론트엔드 `lib/types.ts` 와 양방향으로 동기화됩니다.

    인증: Bearer JWT (next-auth v5 발급) — 모든 보호된 엔드포인트에 필요.
servers:
  - url: https://api.allflow.omelet.ai/v1
    description: Production
  - url: http://localhost:8080/api/v1
    description: Local dev
security:
  - bearerAuth: []

tags:
  - name: identity
  - name: projects
  - name: tasks
  - name: issues
  - name: reports
  - name: ai
  - name: realtime
  - name: notifications
  - name: approvals
  - name: clients
  - name: events
  - name: resources
  - name: docs
  - name: chat
  - name: org
  - name: auth
  - name: gantt

paths:
  /users/me:
    get:
      tags: [identity]
      summary: 현재 로그인 사용자
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
    patch:
      tags: [identity]
      summary: 내 프로필 수정 (모든 필드 optional, 빈 객체 = no-op)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                name: { type: string, minLength: 1, maxLength: 120 }
                role: { type: string, minLength: 1, maxLength: 60 }
                dept: { type: string, minLength: 1, maxLength: 80 }
                initials: { type: string, minLength: 1, maxLength: 8 }
                color: { type: string, pattern: '^#[0-9A-Fa-f]{6}$' }
                email: { type: string, format: email }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }

  /projects:
    get:
      tags: [projects]
      summary: 프로젝트 목록
      parameters:
        - { name: status, in: query, schema: { $ref: '#/components/schemas/StatusKey' } }
        - { name: q, in: query, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Project' }
    post:
      tags: [projects]
      summary: 프로젝트 생성
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }

  /projects/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [projects]
      summary: 프로젝트 단건 조회
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }
    patch:
      tags: [projects]
      summary: 프로젝트 수정
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectPatch' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }

  /tasks:
    get:
      tags: [tasks]
      summary: 태스크 목록
      parameters:
        - { name: projectId, in: query, schema: { type: string } }
        - { name: assigneeId, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/StatusKey' } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Task' }
    post:
      tags: [tasks]
      summary: 태스크 생성
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TaskCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Task' }

  /tasks/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    patch:
      tags: [tasks]
      summary: 태스크 부분 수정
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TaskPatch' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Task' }
    delete:
      tags: [tasks]
      summary: 태스크 삭제
      responses:
        '204': { description: Deleted }

  /tasks/{id}/dependencies:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [tasks]
      summary: 단일 태스크 의존성 그래프 (선후 관계)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [predecessors, successors]
                properties:
                  predecessors:
                    type: array
                    items: { $ref: '#/components/schemas/TaskDependency' }
                  successors:
                    type: array
                    items: { $ref: '#/components/schemas/TaskDependency' }
    post:
      tags: [tasks]
      summary: 의존성 생성 (사이클 검증, FS 검증)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [successorId]
              properties:
                successorId: { type: string }
                type: { $ref: '#/components/schemas/DependencyType' }
                lagDays: { type: integer, default: 0 }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TaskDependency' }
        '422': { description: Cycle or schedule violation }

  /tasks/{id}/dependencies/{depId}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
      - { name: depId, in: path, required: true, schema: { type: string } }
    delete:
      tags: [tasks]
      summary: 의존성 제거
      responses:
        '204': { description: No Content }

  /gantt:
    get:
      tags: [gantt]
      summary: 포트폴리오 간트 조회 (cross-project)
      parameters:
        - { name: projectId, in: query, schema: { type: string } }
        - { name: assigneeId, in: query, schema: { type: string } }
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GanttResponse' }

  /gantt/by-assignee:
    get:
      tags: [gantt]
      summary: 담당자별 그룹 + 충돌 카운트 (Phase 3 전체, Phase 1 최소 그룹)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GanttByAssignee' }

  /issues:
    get:
      tags: [issues]
      summary: 이슈 목록
      parameters:
        - { name: status, in: query, schema: { $ref: '#/components/schemas/IssueStatus' } }
        - { name: prio, in: query, schema: { $ref: '#/components/schemas/IssuePrio' } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Issue' }
    post:
      tags: [issues]
      summary: 이슈 생성
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/IssueCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Issue' }

  /reports/weekly:
    post:
      tags: [reports]
      summary: AI 주간 보고 자동 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [periodStart, periodEnd, scopeIds]
              properties:
                periodStart: { type: string, format: date }
                periodEnd: { type: string, format: date }
                scopeIds: { type: array, items: { type: string } }
                tone: { type: string, enum: [exec, team, casual] }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Report' }

  /reports/monthly:
    post:
      tags: [reports]
      summary: AI 월간 보고 자동 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [year, month]
              properties:
                year: { type: integer }
                month: { type: integer, minimum: 1, maximum: 12 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Report' }

  /reports/{id}/send:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    post:
      tags: [reports]
      summary: 리포트 이메일 발송 큐 적재
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [recipients]
              properties:
                recipients:
                  type: array
                  minItems: 1
                  maxItems: 50
                  items: { type: string, format: email }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [queued, recipients]
                properties:
                  queued: { type: integer }
                  recipients:
                    type: array
                    items: { type: string, format: email }

  /ai/complete:
    post:
      tags: [ai]
      summary: AI 자유 응답 생성 (스트리밍 가능)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt: { type: string }
                context: { type: object, additionalProperties: true }
                stream: { type: boolean, default: false }
      responses:
        '200':
          description: OK (non-streaming)
          content:
            application/json:
              schema:
                type: object
                properties:
                  text: { type: string }
                  citations:
                    type: array
                    items:
                      type: object
                      properties:
                        kind: { type: string, enum: [task, doc, message, issue] }
                        id: { type: string }
            text/event-stream:
              schema:
                type: string
                description: SSE 스트림 - data 라인은 JSON `{delta?, done?, citations?}`

  /ai/extract-actions:
    post:
      tags: [ai]
      summary: 회의록/이메일 → 액션 아이템 추출
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source, content]
              properties:
                source: { type: string, enum: [meeting, email, voice, notion, csv] }
                content: { type: string }
                threshold: { type: number, default: 0.7 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ExtractedAction' }

  /llm-connections:
    get:
      tags: [ai]
      summary: 등록된 LLM 연결 목록 (관리자)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/LlmConnection' }
    post:
      tags: [ai]
      summary: LLM 연결 등록 (관리자)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LlmConnectionInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LlmConnection' }

  /llm-connections/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    patch:
      tags: [ai]
      summary: LLM 연결 수정 (관리자)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LlmConnectionInput' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LlmConnection' }
    delete:
      tags: [ai]
      summary: LLM 연결 삭제 (관리자, 기본/활성 제외)
      responses:
        '204': { description: No Content }

  /llm-connections/{id}/activate:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    post:
      tags: [ai]
      summary: LLM 연결을 활성 기본값으로 설정 (관리자)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LlmConnection' }

  /llm-connections/{id}/test:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    post:
      tags: [ai]
      summary: LLM 연결 핑 테스트 (관리자)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  latencyMs: { type: integer }
                  detail: { type: string }

  /realtime/sse:
    get:
      tags: [realtime]
      summary: Server-Sent Events 스트림 (단방향 푸시)
      responses:
        '200':
          description: SSE 스트림
          content:
            text/event-stream:
              schema:
                type: string
                description: 이벤트 - `notification | activity | presence`

  /notifications:
    get:
      tags: [notifications]
      summary: 알림 목록
      parameters:
        - { name: unread, in: query, schema: { type: boolean } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Notification' }

  /notifications/{id}/read:
    post:
      tags: [notifications]
      summary: 알림 단건 읽음 처리
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }

  /notifications/read-all:
    post:
      tags: [notifications]
      summary: 알림 일괄 읽음 처리 (본인 모든 미읽음을 읽음으로)
      description: |
        본인의 모든 미읽음 알림을 일괄 읽음 처리. 멱등(idempotent).
        요청 본문 없음. 응답에 갱신된 건수를 반환.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [updated]
                properties:
                  updated: { type: integer, description: 읽음으로 갱신된 알림 수 }

  # Note: /tasks/{id} DELETE merged into the existing PATCH path object below.
  # Note: /issues POST merged into the existing GET path object above.

  /issues/{id}/transition:
    post:
      tags: [issues]
      summary: 이슈 상태 전이
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { $ref: '#/components/schemas/IssueStatus' }
                comment: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Issue' }

  /approvals:
    get:
      tags: [approvals]
      summary: 결재 목록
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Approval' } }
    post:
      tags: [approvals]
      summary: 결재 요청 생성
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApprovalCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Approval' }

  /approvals/{id}/decision:
    post:
      tags: [approvals]
      summary: 결재 의사 결정
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision: { type: string, enum: [approved, rejected] }
                comment: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Approval' }

  /clients:
    get:
      tags: [clients]
      summary: CRM 고객 목록
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Client' } }
    post:
      tags: [clients]
      summary: CRM 고객 생성
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ClientCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Client' }

  /events:
    get:
      tags: [events]
      summary: 일정 목록
      parameters:
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Event' } }
    post:
      tags: [events]
      summary: 일정 생성
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EventCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Event' }

  /resources:
    get:
      tags: [resources]
      summary: 리소스 목록
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Resource' } }

  /resources/book:
    post:
      tags: [resources]
      summary: 리소스 예약
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResourceBooking' }
      responses:
        '200': { description: OK }

  /docs:
    get:
      tags: [docs]
      summary: 문서 목록
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Doc' } }
    post:
      tags: [docs]
      summary: 문서 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                content: { type: string }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Doc' }

  /channels:
    get:
      tags: [chat]
      summary: 채팅 채널 목록
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Channel' } }

  /channels/{channelId}/messages:
    post:
      tags: [chat]
      summary: 채팅 메시지 전송
      parameters:
        - { name: channelId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text: { type: string }
      responses:
        '201': { description: Created }

  /org/units:
    get:
      tags: [org]
      summary: 조직 단위 목록
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/OrgUnit' } }

  /org/invitations:
    post:
      tags: [org]
      summary: 구성원 초대
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, orgUnitId, role]
              properties:
                email: { type: string, format: email }
                orgUnitId: { type: string }
                role: { type: string }
      responses:
        '201': { description: Created }

  /auth/tokens/revoke:
    post:
      tags: [auth]
      summary: 토큰 폐기 (멱등)
      description: |
        지정된 tokenId 의 폐기를 요청한다. 본 단계는 audit 로그만 기록하며,
        실제 블록리스트 영속화는 후속 작업 (Prisma RevokedToken 모델 + auth 플러그인 검사).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [tokenId]
              properties:
                tokenId: { type: string, minLength: 1, maxLength: 200 }
                reason: { type: string, minLength: 1, maxLength: 500 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [revoked, tokenId]
                properties:
                  revoked: { type: boolean }
                  tokenId: { type: string }

  # /users/me PATCH merged into /users/me path object above (PDCA-01 cleanup).

  /health:
    get:
      tags: [ops]
      summary: 서비스 헬스체크 (Public)
      description: 인증 불필요. 인프라/모니터링용 liveness 엔드포인트.
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, example: ok }
                  uptime: { type: number, description: 가동 시간(초) }
                  version: { type: string }

  /tasks/{id}/comments:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [comments]
      summary: 태스크 코멘트 목록
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Comment' }
    post:
      tags: [comments]
      summary: 태스크 코멘트 추가
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CommentCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Comment' }

  /issues/{id}/comments:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [comments]
      summary: 이슈 코멘트 목록
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Comment' }
    post:
      tags: [comments]
      summary: 이슈 코멘트 추가
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CommentCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Comment' }

  # NOTE: /realtime/ws (WebSocket fallback) is intentionally not declared here.
  # OpenAPI 3.0/3.1 does not standardize WebSocket. Token via query string,
  # protocol: same Notification/Activity events as /realtime/sse.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    StatusKey:
      type: string
      enum: [todo, doing, review, done, blocked]

    User:
      type: object
      required: [id, name, role, dept, initials, color]
      properties:
        id: { type: string }
        name: { type: string }
        role: { type: string }
        dept: { type: string }
        initials: { type: string }
        color: { type: string }
        email: { type: string, format: email }

    Project:
      type: object
      required: [id, name, code, color, progress, status, due, members, tasks]
      properties:
        id: { type: string }
        name: { type: string }
        code: { type: string }
        color: { type: string }
        progress: { type: integer, minimum: 0, maximum: 100 }
        status: { $ref: '#/components/schemas/StatusKey' }
        due: { type: [string, 'null'], format: date }
        budget: { type: [integer, 'null'] }
        members:
          type: array
          items: { type: string }
        tasks:
          type: object
          required: [total, done]
          properties:
            total: { type: integer }
            done: { type: integer }

    ProjectCreate:
      type: object
      required: [name, code]
      properties:
        name: { type: string }
        code: { type: string }
        color: { type: string }
        due: { type: string, format: date }
        budget: { type: integer }

    ProjectPatch:
      type: object
      properties:
        name: { type: string }
        progress: { type: integer }
        status: { $ref: '#/components/schemas/StatusKey' }
        due: { type: string, format: date }
        budget: { type: integer }

    Task:
      type: object
      required: [id, title, status, proj, assignee, due, priority, tags]
      properties:
        id: { type: string }
        title: { type: string }
        status: { $ref: '#/components/schemas/StatusKey' }
        proj: { type: string }
        assignee: { type: string }
        due: { type: string }
        priority:
          type: string
          enum: [high, med, low]
        tags:
          type: array
          items: { type: string }
        startDate: { type: [string, 'null'], format: date }
        endDate: { type: [string, 'null'], format: date }
        parentTaskId: { type: [string, 'null'] }
        kind: { $ref: '#/components/schemas/TaskKind' }
        progress: { type: integer, minimum: 0, maximum: 100 }

    TaskCreate:
      type: object
      required: [title, proj, assignee]
      properties:
        title: { type: string }
        proj: { type: string }
        assignee: { type: string }
        due: { type: string, format: date }
        priority:
          type: string
          enum: [high, med, low]

    TaskPatch:
      type: object
      properties:
        title: { type: string }
        status: { $ref: '#/components/schemas/StatusKey' }
        assignee: { type: string }
        due: { type: string, format: date }
        startDate: { type: [string, 'null'], format: date }
        endDate: { type: [string, 'null'], format: date }
        kind: { $ref: '#/components/schemas/TaskKind' }
        progress: { type: integer, minimum: 0, maximum: 100 }

    TaskKind:
      type: string
      enum: [task, milestone, summary]

    DependencyType:
      type: string
      enum: [FS, SS, FF, SF]

    TaskDependency:
      type: object
      required: [id, predecessorId, successorId, type, lagDays]
      properties:
        id: { type: string }
        predecessorId: { type: string }
        successorId: { type: string }
        type: { $ref: '#/components/schemas/DependencyType' }
        lagDays: { type: integer }
        createdAt: { type: string, format: date-time }

    GanttTask:
      type: object
      required: [id, title, kind, projectId, status, priority, progress]
      properties:
        id: { type: string }
        title: { type: string }
        kind: { $ref: '#/components/schemas/TaskKind' }
        projectId: { type: string }
        projectColor: { type: string }
        assigneeId: { type: [string, 'null'] }
        startDate: { type: [string, 'null'], format: date }
        endDate: { type: [string, 'null'], format: date }
        progress: { type: integer, minimum: 0, maximum: 100 }
        status: { $ref: '#/components/schemas/StatusKey' }
        priority:
          type: string
          enum: [high, med, low]

    GanttResponse:
      type: object
      required: [tasks, dependencies]
      properties:
        range:
          type: object
          properties:
            from: { type: string, format: date }
            to: { type: string, format: date }
        tasks:
          type: array
          items: { $ref: '#/components/schemas/GanttTask' }
        dependencies:
          type: array
          items: { $ref: '#/components/schemas/TaskDependency' }

    GanttByAssignee:
      type: object
      required: [groups]
      properties:
        groups:
          type: array
          items:
            type: object
            required: [assigneeId, tasks]
            properties:
              assigneeId: { type: [string, 'null'] }
              assigneeName: { type: [string, 'null'] }
              tasks:
                type: array
                items: { $ref: '#/components/schemas/GanttTask' }
              conflictCount: { type: integer, minimum: 0 }

    IssueSev:
      type: string
      enum: [critical, high, med, low]
    IssuePrio:
      type: string
      enum: [P0, P1, P2, P3]
    IssueStatus:
      type: string
      enum: [open, in-progress, in-review, resolved]

    Issue:
      type: object
      required:
        [id, title, proj, projColor, sev, prio, status, assignee, reporter,
         tags, created, sla, slaPct, comments, linked]
      properties:
        id: { type: string }
        title: { type: string }
        proj: { type: string }
        projColor: { type: string }
        sev: { $ref: '#/components/schemas/IssueSev' }
        prio: { $ref: '#/components/schemas/IssuePrio' }
        status: { $ref: '#/components/schemas/IssueStatus' }
        assignee: { type: string }
        reporter: { type: string }
        tags:
          type: array
          items: { type: string }
        created: { type: string }
        sla: { type: string }
        slaPct: { type: integer }
        comments: { type: integer }
        linked: { type: integer }
        resolved: { type: boolean }

    Report:
      type: object
      required: [id, kind, periodStart, periodEnd, generatedAt, sections]
      properties:
        id: { type: string }
        kind:
          type: string
          enum: [weekly, monthly]
        periodStart: { type: string, format: date }
        periodEnd: { type: string, format: date }
        generatedAt: { type: string, format: date-time }
        author: { type: string }
        tldr: { type: string }
        kpis:
          type: array
          items:
            type: object
            properties:
              label: { type: string }
              value: { type: string }
              delta: { type: string }
              dir: { type: string, enum: [up, down, flat] }
        sections:
          type: array
          items:
            type: object
            properties:
              heading: { type: string }
              body: { type: string }
              citations:
                type: array
                items:
                  type: object
                  properties:
                    kind: { type: string }
                    id: { type: string }
                    label: { type: string }

    ExtractedAction:
      type: object
      required: [title, assignee, confidence]
      properties:
        title: { type: string }
        assignee: { type: string }
        due: { type: string, format: date }
        priority: { type: string, enum: [high, med, low] }
        confidence: { type: number, minimum: 0, maximum: 1 }
        sourceQuote: { type: string }

    LlmKind:
      type: string
      enum: [lmstudio, ollama, openai, anthropic, custom_openai_compat]

    LlmConnection:
      type: object
      required: [id, name, kind, baseUrl, model, hasApiKey, isActive, isDefault, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        kind: { $ref: '#/components/schemas/LlmKind' }
        baseUrl: { type: string }
        model: { type: string }
        hasApiKey: { type: boolean }
        isActive: { type: boolean }
        isDefault: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    LlmConnectionInput:
      type: object
      required: [name, kind, baseUrl, model]
      properties:
        name: { type: string, maxLength: 80 }
        kind: { $ref: '#/components/schemas/LlmKind' }
        baseUrl: { type: string, format: uri }
        model: { type: string, maxLength: 120 }
        apiKey: { type: string, nullable: true }

    Notification:
      type: object
      required: [id, kind, title, time, read]
      properties:
        id: { type: string }
        kind:
          type: string
          enum: [mention, sla, ai, system, comment]
        title: { type: string }
        body: { type: string }
        actor: { type: string }
        time: { type: string, format: date-time }
        read: { type: boolean }
        href: { type: string }

    RealtimeEvent:
      oneOf:
        - { $ref: '#/components/schemas/RealtimeNotification' }
        - { $ref: '#/components/schemas/RealtimeActivity' }
        - { $ref: '#/components/schemas/RealtimePresence' }
        - { $ref: '#/components/schemas/RealtimeChat' }
      discriminator:
        propertyName: type

    RealtimeNotification:
      type: object
      required: [type, payload]
      properties:
        type: { type: string, enum: [notification] }
        payload: { $ref: '#/components/schemas/Notification' }

    RealtimeActivity:
      type: object
      required: [type, payload]
      properties:
        type: { type: string, enum: [activity] }
        payload:
          type: object
          properties:
            who: { type: string }
            what: { type: string }
            target: { type: string }
            verb: { type: string }
            time: { type: string }
            proj: { type: string }
            kind: { type: string }

    RealtimePresence:
      type: object
      required: [type, payload]
      properties:
        type: { type: string, enum: [presence] }
        payload:
          type: object
          properties:
            userId: { type: string }
            online: { type: boolean }
            lastSeen: { type: string, format: date-time }

    RealtimeChat:
      type: object
      required: [type, payload]
      properties:
        type: { type: string, enum: [chat] }
        payload:
          type: object
          properties:
            channelId: { type: string }
            messageId: { type: string }
            authorId: { type: string }
            text: { type: string }
            time: { type: string, format: date-time }

    Approval:
      type: object
      required: [id, title, requester, approver, status, createdAt]
      properties:
        id: { type: string }
        title: { type: string }
        requester: { type: string }
        approver: { type: string }
        status: { type: string, enum: [pending, approved, rejected, cancelled] }
        amount: { type: number }
        reason: { type: string }
        decidedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

    ApprovalCreate:
      type: object
      required: [title, approver]
      properties:
        title: { type: string }
        approver: { type: string }
        amount: { type: number }
        reason: { type: string }

    Client:
      type: object
      required: [id, name, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        contact: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        industry: { type: string }
        ownerId: { type: string }
        createdAt: { type: string, format: date-time }

    ClientCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        contact: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        industry: { type: string }

    Event:
      type: object
      required: [id, title, start, end, attendees, source]
      properties:
        id: { type: string }
        title: { type: string }
        start: { type: string, format: date-time }
        end: { type: string, format: date-time }
        location: { type: string }
        attendees: { type: array, items: { type: string } }
        resourceId: { type: string }
        source: { type: string, enum: [internal, google, outlook] }

    EventCreate:
      type: object
      required: [title, start, end]
      properties:
        title: { type: string }
        start: { type: string, format: date-time }
        end: { type: string, format: date-time }
        location: { type: string }
        attendees: { type: array, items: { type: string } }
        resourceId: { type: string }

    Resource:
      type: object
      required: [id, name, kind]
      properties:
        id: { type: string }
        name: { type: string }
        kind: { type: string, enum: [room, equipment] }
        capacity: { type: integer }
        location: { type: string }

    ResourceBooking:
      type: object
      required: [resourceId, start, end, bookedBy]
      properties:
        resourceId: { type: string }
        start: { type: string, format: date-time }
        end: { type: string, format: date-time }
        bookedBy: { type: string }

    Doc:
      type: object
      required: [id, title, ownerId, updatedAt]
      properties:
        id: { type: string }
        title: { type: string }
        ownerId: { type: string }
        updatedAt: { type: string, format: date-time }
        preview: { type: string }

    Channel:
      type: object
      required: [id, name, kind, members]
      properties:
        id: { type: string }
        name: { type: string }
        kind: { type: string, enum: [public, private, dm] }
        members: { type: array, items: { type: string } }

    OrgUnit:
      type: object
      required: [id, name, parentId, members]
      properties:
        id: { type: string }
        name: { type: string }
        parentId:
          oneOf:
            - { type: string }
            - { type: 'null' }
        members: { type: array, items: { type: string } }

    IssueCreate:
      type: object
      required: [title, proj, assignee, reporter, sev, prio]
      properties:
        title: { type: string }
        proj: { type: string }
        assignee: { type: string }
        reporter: { type: string }
        sev: { $ref: '#/components/schemas/IssueSev' }
        prio: { $ref: '#/components/schemas/IssuePrio' }
        tags: { type: array, items: { type: string } }

    Comment:
      type: object
      required: [id, body, author, createdAt]
      properties:
        id: { type: string }
        body: { type: string }
        author:
          type: object
          required: [id, name]
          properties:
            id: { type: string }
            name: { type: string }
        createdAt: { type: string, format: date-time }

    CommentCreate:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1, maxLength: 4000 }

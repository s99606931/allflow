# Step 8 — OpenTelemetry Collector minimal pipeline.
# Receivers: OTLP HTTP(4318) + gRPC(4317).
# Processors: batch (5s timeout, 1024 batch).
# Exporters: OTLP → Tempo (insecure, dev only).
# Step 9 에서 prometheus exporter / tail-sampling / 인증 추가 예정.
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]

# ALL-Flow - dev override
# Activates: bind-mount source, hot reload, expose DB/Redis ports.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml --env-file .env.dev up -d
#
# Step 7 (monorepo-microservices-2026-04-30 PRD §5.1 #7):
#   packages/ bind-mount added — pnpm workspace symlinks resolve in containers
#   and tsup-built packages/*/dist propagate to BE/FE dev (G6 carry-over).

services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  backend:
    image: allflow-backend:dev
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: dev
    # Step 7 (monorepo G6 carry-over): startup installs workspace deps from
    # monorepo root so @all-flow/{shared,contracts} resolve, then runs dev.
    # Trade-off: ~5-15s startup cold-install on volume reset; warm cache after.
    working_dir: /workspace/apps/backend
    command:
      - sh
      - -c
      - |
        set -e
        cd /workspace
        if [ ! -L /workspace/apps/backend/node_modules/@all-flow/shared ]; then
          echo "[step7-dev-init] installing workspace deps (monorepo root)..."
          pnpm install --frozen-lockfile
        fi
        if [ ! -d /workspace/apps/backend/node_modules/.prisma/client ]; then
          echo "[step7-dev-init] prisma generate..."
          pnpm --filter @all-flow/backend prisma:generate
        fi
        exec pnpm --filter @all-flow/backend dev
    environment:
      # CI=true → pnpm install non-interactive (no TTY).
      CI: "true"
      NODE_ENV: development
      LOG_LEVEL: debug
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      # next-auth v5 호환 (JWT_SECRET을 AUTH_SECRET으로 매핑, 32+ chars).
      AUTH_SECRET: ${AUTH_SECRET:-${JWT_SECRET:-dev-auth-secret-32chars-minimum-padding-xx}}
      # Prisma DATABASE_URL (compose-internal).
      DATABASE_URL: postgresql://${POSTGRES_USER:-allflow}:${POSTGRES_PASSWORD:-allflow_dev_pw}@postgres:5432/${POSTGRES_DB:-allflow}?schema=public
    volumes:
      # Step 7 (monorepo G6 carry-over): bind monorepo root so pnpm workspace
      # install resolves @all-flow/{shared,contracts,...}. Backend code stays
      # at /workspace/apps/backend (working_dir overridden above).
      - ../..:/workspace
      - backend-node-modules:/workspace/apps/backend/node_modules
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    image: allflow-frontend:dev
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: dev
    # Step 7 (monorepo G6 carry-over): same pattern as backend.
    working_dir: /workspace/apps/frontend
    command:
      - sh
      - -c
      - |
        set -e
        cd /workspace
        if [ ! -L /workspace/apps/frontend/node_modules/@all-flow/contracts ]; then
          echo "[step7-dev-init] installing workspace deps (monorepo root)..."
          pnpm install --frozen-lockfile --ignore-scripts
        fi
        # Alpine (musl) native binary fix: pnpm installs gnu binaries on host (WSL2/glibc).
        # Container is Alpine; ensure musl variants are present in the pnpm virtual store.
        MUSL_OXIDE="/workspace/node_modules/.pnpm/@tailwindcss+oxide-linux-x64-musl@4.2.4/node_modules/@tailwindcss/oxide-linux-x64-musl/tailwindcss-oxide.linux-x64-musl.node"
        MUSL_LC="/workspace/node_modules/.pnpm/lightningcss@1.32.0/node_modules/lightningcss.linux-x64-musl.node"
        if [ ! -f "$$MUSL_OXIDE" ]; then
          echo "[musl-fix] Installing @tailwindcss/oxide-linux-x64-musl..."
          npm install --prefix /tmp/musl-fix @tailwindcss/oxide-linux-x64-musl@4.2.4 --ignore-scripts 2>/dev/null
          mkdir -p "$$(dirname "$$MUSL_OXIDE")"
          cp /tmp/musl-fix/node_modules/@tailwindcss/oxide-linux-x64-musl/tailwindcss-oxide.linux-x64-musl.node "$$MUSL_OXIDE"
          cp /tmp/musl-fix/node_modules/@tailwindcss/oxide-linux-x64-musl/package.json "$$(dirname "$$MUSL_OXIDE")/"
        fi
        if [ ! -f "$$MUSL_LC" ]; then
          echo "[musl-fix] Installing lightningcss-linux-x64-musl..."
          npm install --prefix /tmp/musl-lc lightningcss-linux-x64-musl@1.32.0 --ignore-scripts 2>/dev/null
          cp /tmp/musl-lc/node_modules/lightningcss-linux-x64-musl/lightningcss.linux-x64-musl.node "$$MUSL_LC"
        fi
        exec pnpm --filter ./apps/frontend exec next dev --webpack
    environment:
      CI: "true"
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      # Design §4 명시 4 env — self-contained dev 보강 (gap-detector Act 권장 1번).
      NEXTAUTH_SECRET: ${AUTH_SECRET:-${JWT_SECRET:-dev-auth-secret-32chars-minimum-padding-xx}}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost}
      BACKEND_URL: ${BACKEND_URL:-http://backend:8080/api/v1}
      # 브라우저 API 호출은 상대 경로 /api/v1 → FE proxy → BE (단일 origin)
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
      NEXT_PUBLIC_USE_MOCK: ${NEXT_PUBLIC_USE_MOCK:-false}
      NEXT_PUBLIC_E2E: ${NEXT_PUBLIC_E2E:-false}
      AUTH_SECRET: ${AUTH_SECRET:-${JWT_SECRET:-dev-auth-secret-32chars-minimum-padding-xx}}
    volumes:
      - ../..:/workspace
      - frontend-node-modules:/workspace/apps/frontend/node_modules
      - frontend-next-cache:/workspace/apps/frontend/.next
    ports:
      - "${FRONTEND_PORT:-80}:3000"

  # Step 8 (monorepo-microservices-2026-04-30 PRD §5.1 #8) — Observability profile.
  # Default 가동 시 미실행. 활성화:
  #   docker compose -f docker-compose.yml -f docker-compose.dev.yml --env-file .env.dev \
  #     --profile observability up -d
  # BE 활성화: OTEL_ENABLED=true OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
  otel-collector:
    profiles: ["observability"]
    image: otel/opentelemetry-collector-contrib:0.121.0
    container_name: allflow-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./docker/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    networks:
      - allflow-net
    ports:
      - "${OTEL_COLLECTOR_HTTP_PORT:-4318}:4318"
      - "${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317"
    depends_on:
      - tempo

  tempo:
    profiles: ["observability"]
    image: grafana/tempo:2.7.0
    container_name: allflow-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./docker/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    networks:
      - allflow-net
    ports:
      - "${TEMPO_HTTP_PORT:-3200}:3200"


volumes:
  backend-node-modules:
    name: allflow-backend-node-modules-dev
  frontend-node-modules:
    name: allflow-frontend-node-modules-dev
  frontend-next-cache:
    name: allflow-frontend-next-cache-dev
  tempo-data:
    name: allflow-tempo-data-dev

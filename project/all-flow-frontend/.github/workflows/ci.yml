name: CI

# 빠른 PR 피드백을 위한 메인 CI.
# E2E (Playwright)는 .github/workflows/e2e.yml 로 분리되어
# 동시 실행되며, 본 워크플로우는 그 결과를 기다리지 않는다.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: 타입체크 · 린트 · 유닛 테스트
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: all-flow-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: all-flow-frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test --reporter=verbose
      - run: pnpm openapi:check

  build:
    name: 프로덕션 빌드 검증
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-test
    defaults:
      run:
        working-directory: all-flow-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: all-flow-frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm build-storybook

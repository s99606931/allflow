name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - 'all-flow-backend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'all-flow-backend/**'
      - '.github/workflows/ci.yml'

# 동일 PR/branch 의 이전 실행은 취소해서 비용 절약.
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: 타입체크 (tsc --noEmit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: all-flow-backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: all-flow-backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    name: 린트 (biome)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: all-flow-backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: all-flow-backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    name: 유닛 테스트 (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: all-flow-backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: all-flow-backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test --reporter=verbose

  build:
    name: 빌드 (tsup)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [typecheck, lint, test]
    defaults:
      run:
        working-directory: all-flow-backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: all-flow-backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Upload dist artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: all-flow-backend/dist
          retention-days: 7

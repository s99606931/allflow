# ALL-Flow - base compose (env-agnostic)
# Use with overlays:
#   dev : -f docker-compose.yml -f docker-compose.dev.yml --env-file .env.dev
#   prod: -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod

name: ${COMPOSE_PROJECT_NAME:-allflow}

services:
  postgres:
    image: postgres:16-alpine
    container_name: allflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-allflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-allflow_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-allflow}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - allflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-allflow} -d ${POSTGRES_DB:-allflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: allflow-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    networks:
      - allflow-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:-}\" --no-auth-warning ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    image: allflow-backend:${IMAGE_TAG:-local}
    container_name: allflow-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-allflow}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-allflow_dev_pw}
      DB_NAME: ${POSTGRES_DB:-allflow}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - allflow-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    image: allflow-frontend:${IMAGE_TAG:-local}
    container_name: allflow-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXTAUTH_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      BACKEND_URL: ${BACKEND_URL:-http://backend:8080/api/v1}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
      NEXT_PUBLIC_USE_MOCK: ${NEXT_PUBLIC_USE_MOCK:-false}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - allflow-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ -S 2>&1 | grep -qE 'HTTP/.* (200|301|302|307|308)' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

networks:
  allflow-net:
    name: allflow-net
    driver: bridge

volumes:
  pg-data:
    name: allflow-pg-data
  redis-data:
    name: allflow-redis-data

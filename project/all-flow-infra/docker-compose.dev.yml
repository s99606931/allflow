# ALL-Flow - dev override
# Activates: bind-mount source, hot reload, expose DB/Redis ports.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml --env-file .env.dev up -d

services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  backend:
    image: allflow-backend:dev
    build:
      context: ../all-flow-backend
      dockerfile: Dockerfile
      target: dev
    command: ["pnpm", "dev"]
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ../all-flow-backend:/app
      - backend-node-modules:/app/node_modules
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    image: allflow-frontend:dev
    build:
      context: ../all-flow-frontend
      dockerfile: Dockerfile
      target: dev
    command: ["pnpm", "dev"]
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ../all-flow-frontend:/app
      - frontend-node-modules:/app/node_modules
      - frontend-next-cache:/app/.next
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  backend-node-modules:
    name: allflow-backend-node-modules-dev
  frontend-node-modules:
    name: allflow-frontend-node-modules-dev
  frontend-next-cache:
    name: allflow-frontend-next-cache-dev

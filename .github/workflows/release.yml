# Owner: av-oss-release-manager
# Triggers on git tag push (vX.Y.Z) — creates GitHub Release with CHANGELOG extract
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          tag="${GITHUB_REF##*/}"
          version="${tag#v}"
          awk -v v="$version" '
            $0 ~ "^## \\["v"\\]" {flag=1; next}
            /^## \[/ && flag {exit}
            flag {print}
          ' CHANGELOG.md > /tmp/release-notes.md
          echo "notes_path=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: ${{ steps.notes.outputs.notes_path }}
          draft: false
          prerelease: false

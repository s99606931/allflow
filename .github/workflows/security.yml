# Owner: av-oss-security-officer
# Daily security scan + on every PR
name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 5 * * *'  # daily 05:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' || github.repository == github.event.repository.full_name
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript,python
        continue-on-error: true
      - uses: github/codeql-action/analyze@v3
        continue-on-error: true

  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep with default policies
        run: semgrep ci --config=p/typescript --config=p/owasp-top-ten --config=p/javascript
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

  pnpm-audit:
    name: pnpm audit (BE + FE)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        project:
          - all-flow-backend
          - all-flow-frontend
    defaults:
      run:
        working-directory: project/${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: project/${{ matrix.project }}/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # High-severity audit fails the build; moderate/low are reported but allowed.
      - name: pnpm audit (high+critical fail)
        run: pnpm audit --audit-level=high --prod
